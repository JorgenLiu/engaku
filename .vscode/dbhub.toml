# DBHub MCP server configuration
# Generated by engaku init — edit to add sources, tools, or guardrails.
# Secrets stay in the password-protected MCP input; this file is safe to commit.

[[sources]]
id   = "default"
dsn  = "${DBHUB_DSN}"
lazy = true

[[tools]]
name     = "execute_sql"
source   = "default"
readonly = true
max_rows = 1000

# search_objects is a built-in tool that is always available — no config needed.

# Custom tools — define reusable, parameterized SQL operations as MCP tools.
# Uncomment and adapt to your schema. Parameter placeholders: $1, $2 (PostgreSQL),
# ?, ? (MySQL/MariaDB/SQLite), @p1, @p2 (SQL Server).
#
# [[tools]]
# name        = "get_record_by_id"
# description = "Retrieve a record by its primary key"
# source      = "default"
# statement   = "SELECT * FROM my_table WHERE id = $1"
#
# [[tools.parameters]]
# name        = "id"
# type        = "integer"
# description = "The record's primary key"
